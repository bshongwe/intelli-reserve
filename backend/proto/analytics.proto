syntax = "proto3";

package intelli_reserve.analytics;

import "common.proto";

option go_package = "github.com/intelli-reserve/backend/gen/go/analytics";
option java_multiple_files = true;
option java_package = "com.intelli_reserve.analytics";

// Analytics Service - handles analytics and dashboard data

service AnalyticsService {
  // Get dashboard metrics for a host
  rpc GetDashboardMetrics(GetDashboardMetricsRequest) returns (GetDashboardMetricsResponse);
  
  // Get analytics data for a host
  rpc GetAnalytics(GetAnalyticsRequest) returns (GetAnalyticsResponse);
  
  // Get revenue report
  rpc GetRevenueReport(GetRevenueReportRequest) returns (GetRevenueReportResponse);
  
  // Get booking statistics
  rpc GetBookingStatistics(GetBookingStatisticsRequest) returns (GetBookingStatisticsResponse);
}

// Request/Response messages

message GetDashboardMetricsRequest {
  string host_id = 1;
}

message DashboardMetrics {
  int32 upcoming_bookings = 1;
  string total_revenue = 2;
  double avg_occupancy = 3;
  double response_rate = 4;
  repeated DataPoint revenue_data = 5;
  repeated DataPoint occupancy_data = 6;
}

message GetDashboardMetricsResponse {
  bool success = 1;
  DashboardMetrics metrics = 2;
  string error_message = 3;
}

message GetAnalyticsRequest {
  string host_id = 1;
  string time_range = 2; // 1m, 3m, 6m, 1y
}

message AnalyticsData {
  repeated DataPoint revenue_data = 1;
  repeated StatusData booking_status_data = 2;
  repeated ServiceData top_services = 3;
  repeated CustomerData top_customers = 4;
  Metrics metrics = 5;
}

message DataPoint {
  string label = 1;
  double value = 2;
  string date = 3;
}

message StatusData {
  string status = 1;
  int32 count = 2;
}

message ServiceData {
  string service_id = 1;
  string service_name = 2;
  int32 bookings = 3;
  double revenue = 4;
}

message CustomerData {
  string customer_name = 1;
  string customer_email = 2;
  int32 total_bookings = 3;
  double total_spent = 4;
}

message Metrics {
  string total_revenue = 1;
  int32 total_bookings = 2;
  int32 active_customers = 3;
  double avg_rating = 4;
}

message GetAnalyticsResponse {
  bool success = 1;
  AnalyticsData data = 2;
  string error_message = 3;
}

message GetRevenueReportRequest {
  string host_id = 1;
  string start_date = 2;
  string end_date = 3;
}

message RevenueReport {
  double total_revenue = 1;
  double completed_bookings_revenue = 2;
  double pending_bookings_revenue = 3;
  repeated DataPoint daily_revenue = 4;
}

message GetRevenueReportResponse {
  bool success = 1;
  RevenueReport report = 2;
  string error_message = 3;
}

message GetBookingStatisticsRequest {
  string host_id = 1;
  string time_range = 2; // 1m, 3m, 6m, 1y
}

message BookingStatistics {
  int32 total_bookings = 1;
  int32 confirmed_bookings = 2;
  int32 pending_bookings = 3;
  int32 cancelled_bookings = 4;
  int32 completed_bookings = 5;
  double booking_completion_rate = 6;
  double avg_booking_value = 7;
}

message GetBookingStatisticsResponse {
  bool success = 1;
  BookingStatistics statistics = 2;
  string error_message = 3;
}
